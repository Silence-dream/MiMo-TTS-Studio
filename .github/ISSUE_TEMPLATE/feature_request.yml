name: 功能建议 / Feature Request
description: 提出新功能或改进建议 / Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请尽量详细描述你的想法。

        Thanks for your feature request! Please describe your idea in detail.

  - type: textarea
    id: problem
    attributes:
      label: 问题描述 / Problem Description
      description: 你的建议是为了解决什么问题？ / What problem does this feature solve?
      placeholder: 当我在使用...时，我发现... / When using..., I found that...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案 / Proposed Solution
      description: 描述你希望实现的功能 / Describe the feature you'd like
      placeholder: 我希望能... / I would like to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives Considered
      description: 你是否考虑过其他替代方案？ / Have you considered any alternative solutions?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息 / Additional Context
      description: 其他上下文信息、截图或参考链接 / Any other context, screenshots, or reference links
    validations:
      required: false
